<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)" />
  
  <!-- Checkmark circle -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.2"/>
  
  <!-- Checkmark -->
  <polyline points="75,100 92,117 125,84" 
    fill="none" 
    stroke="url(#checkGrad)" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  
  <!-- Small decorative dots -->
  <circle cx="60" cy="55" r="3" fill="white" fill-opacity="0.3"/>
  <circle cx="140" cy="55" r="3" fill="white" fill-opacity="0.3"/>
  <circle cx="60" cy="145" r="3" fill="white" fill-opacity="0.3"/>
  <circle cx="140" cy="145" r="3" fill="white" fill-opacity="0.3"/>
  
  <!-- Subtle ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
</svg>